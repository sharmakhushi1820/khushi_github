<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/dist/output.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

    <div class="container mt-48 flex mx-auto items-center justify-center">
        <div class="left w-1/3 mx-14">
            <img class="w-40" src="fb.jpg" alt="image not found">
            <p class="text-3xl mx-8"> Facebook helps you connect and share with the people in your life.</p>
        </div>

        <div class="right flex flex-col mx-auto bg-white p-8 rounded-lg w-1/4 mt-60">
            <input class="px-4 h-12 my-3 border-2 border-gray-300 rounded-xl" type="text"
                placeholder="email address or phone number">

            <input class="px-4 h-12 my-3 border-2 border-gray-300 rounded-lg outline-blue-600" type="password" placeholder="password">
            <button class="bg-blue-600 hover:bg-blue-700 text-white my-2 py-3 rounded-md font-bold">log in</button>

            <span class="text-blue-500 text-center text-sm my-3 cursor-pointer hover:underline">Forgotten
                password?</span>
            <hr class="my-2">
            <button
                class="bg-green-600 hover:bg-green-700 text-white my-3 py-3 px-4 mx-auto rounded-md font-bold w-fit">create
                new account</button>

        </div>
    </div>

</body>

</html>
